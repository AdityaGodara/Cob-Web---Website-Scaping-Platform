services:

  postgres:
    image: postgres:17
    container_name: cobweb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cobweb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cobweb} -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cobweb_network

  redis:
    image: redis:7-alpine
    container_name: cobweb_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cobweb_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cobweb_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys,urllib.request as u; r=u.urlopen('http://127.0.0.1:8000/health'); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cobweb_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cobweb_worker
    restart: unless-stopped
    env_file:
      - .env
    command: >
      uv run celery
      -A app.workers.celery_app
      worker
      --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cobweb_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cobweb_frontend
    restart: unless-stopped
    networks:
      - cobweb_network

  nginx:
    build: ./nginx
    container_name: cobweb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cobweb_network

volumes:
  postgres_data:
  redis_data:

networks:
  cobweb_network:
    driver: bridge