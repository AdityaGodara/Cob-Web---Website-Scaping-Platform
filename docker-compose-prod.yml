services:

  nginx:
    build: ./nginx
    container_name: cobweb_nginx
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - frontend
      - api
        
  frontend:
    build: ./frontend
    restart: unless-stopped

  api:
    build: .
    restart: unless-stopped

    command: >
      uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  worker:
    build: .
    restart: unless-stopped

    command: >
      uv run celery
      -A app.workers.celery_app
      worker
      --loglevel=info

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cobweb"]

  redis:
    image: redis:7-alpine

    restart: unless-stopped

    volumes:
      - redis_data:/data

    command:
      - redis-server
      - --appendonly
      - "yes"

volumes:
  postgres_data:
  redis_data: